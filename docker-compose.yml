services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tastegraph
      POSTGRES_USER: tg
      POSTGRES_PASSWORD: tg_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tg -d tastegraph"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://tg:tg_dev_password@db:5432/tastegraph
      JWT_SECRET: dev-secret-change-me-in-production
      JWT_EXPIRY_HOURS: "72"
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      EMBEDDING_MODEL: all-MiniLM-L6-v2
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - model_cache:/root/.cache

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  model_cache:
